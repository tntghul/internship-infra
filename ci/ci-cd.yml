name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Step 1: Code checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔹 Step 2: Docker login
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🔹 Step 3: Build Backend Image
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend

      # 🔹 Step 4: Push Backend Image
      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

      # 🔹 Step 5: Build Frontend Image
      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frontend

      # 🔹 Step 6: Push Frontend Image
      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      # 🔹 Step 7: Build Worker Image
      - name: Build Worker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/worker:latest ./worker

      # 🔹 Step 8: Push Worker Image
      - name: Push Worker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/worker:latest
