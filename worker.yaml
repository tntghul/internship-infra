apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: internship
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: sandhyak23/internship-worker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: app-config