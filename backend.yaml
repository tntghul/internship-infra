apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: internship
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: sandhyak23/internship-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"
            - name: MONGO_URI
              value: "mongodb://mongo-service:27017/ai_data"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: internship
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 5000